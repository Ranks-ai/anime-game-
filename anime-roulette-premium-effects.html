<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Anime Roulette Ultimate</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  --bg-inner: #1a1a2f;
  --bg-outer: #0a0a14;
  --energy-a: rgba(0,200,255,0.15);
  --energy-b: rgba(138,43,226,0.15);
  --energy-c: rgba(255,0,150,0.15);
  background: radial-gradient(circle at center, var(--bg-inner), var(--bg-outer) 70%);
  color: white;
  text-align: center;
  padding: 20px;
  font-family: Arial;
  overflow-x: hidden;
  min-height: 100vh;
  position: relative;
  transition: background 0.8s ease;
}

body::before {
  content: "";
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: conic-gradient(
    from 0deg,
    var(--energy-a),
    var(--energy-b),
    var(--energy-c),
    var(--energy-a)
  );
  animation: spinEnergy 20s linear infinite;
  z-index: -2;
  pointer-events: none;
}

@keyframes spinEnergy {
  0% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate(180deg) scale(1.04); }
  100% { transform: rotate(360deg) scale(1); }
}

@keyframes titlePulse {
  0%, 100% { transform: translateY(0); text-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 0 0 40px rgba(138, 43, 226, 0.4); }
  50% { transform: translateY(-3px); text-shadow: 0 0 26px rgba(255, 225, 90, 0.9), 0 0 56px rgba(174, 77, 255, 0.58); }
}

@keyframes titleShine {
  0% { left: -35%; }
  100% { left: 120%; }
}

body.theme-strength {
  --bg-inner: #2f1a1a;
  --bg-outer: #140a0a;
  --energy-a: rgba(255, 80, 80, 0.20);
  --energy-b: rgba(255, 170, 60, 0.18);
  --energy-c: rgba(255, 0, 120, 0.18);
}

body.theme-speed {
  --bg-inner: #14253a;
  --bg-outer: #070f1a;
  --energy-a: rgba(0, 220, 255, 0.22);
  --energy-b: rgba(0, 150, 255, 0.18);
  --energy-c: rgba(120, 255, 255, 0.16);
}

body.theme-defense {
  --bg-inner: #1a2f24;
  --bg-outer: #0a140f;
  --energy-a: rgba(0, 255, 150, 0.20);
  --energy-b: rgba(0, 200, 120, 0.18);
  --energy-c: rgba(120, 255, 80, 0.16);
}

body.theme-stamina {
  --bg-inner: #2f2a1a;
  --bg-outer: #14110a;
  --energy-a: rgba(255, 220, 0, 0.20);
  --energy-b: rgba(255, 150, 0, 0.18);
  --energy-c: rgba(255, 245, 130, 0.16);
}

body.theme-balanced {
  --bg-inner: #201a2f;
  --bg-outer: #0d0a14;
  --energy-a: rgba(170, 100, 255, 0.18);
  --energy-b: rgba(0, 210, 255, 0.16);
  --energy-c: rgba(255, 0, 170, 0.16);
}

h1 {
  color: #FFD700;
  text-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 0 0 40px rgba(138, 43, 226, 0.4);
  font-size: 2.5em;
  margin: 44px 0 20px;
  position: relative;
  z-index: 1;
  animation: titlePulse 3.8s ease-in-out infinite;
}

h1::after {
  content: "";
  position: absolute;
  top: 0;
  left: -35%;
  width: 28%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
  transform: skewX(-20deg);
  animation: titleShine 5s linear infinite;
  pointer-events: none;
}

#joinSection {
  margin: 30px 0;
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
}

#joinSection input {
  padding: 12px 15px;
  border: 2px solid #FFD700;
  background: #1a1a2b;
  color: white;
  border-radius: 5px;
  font-size: 14px;
  width: 250px;
}

#joinSection button {
  padding: 12px 25px;
  background: linear-gradient(135deg, #FFD700, #FFA500);
  color: black;
  border: none;
  cursor: pointer;
  font-weight: bold;
  border-radius: 5px;
  font-size: 14px;
  transition: all 0.3s;
}

#joinSection button:hover {
  transform: scale(1.05);
}

#joinSection button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.error-msg {
  color: #FF6B6B;
  background: rgba(255, 107, 107, 0.1);
  border: 2px solid #FF6B6B;
  padding: 15px;
  border-radius: 10px;
  margin: 10px 0;
  max-width: 300px;
  font-size: 13px;
}

.success-msg {
  color: #00FF96;
  background: rgba(0, 255, 150, 0.1);
  border: 2px solid #00FF96;
  padding: 15px;
  border-radius: 10px;
  margin: 10px 0;
  max-width: 300px;
  font-size: 13px;
}

#gameSection {
  display: none;
  position: relative;
  z-index: 1;
}

canvas {
  border: 3px solid #FFD700;
  background: #0a0a12;
  margin: 20px 0;
  display: block;
  border-radius: 50%;
  box-shadow: 0 0 40px rgba(255, 215, 0, 0.6), 0 0 80px rgba(138, 43, 226, 0.4);
  cursor: pointer;
}

button {
  padding: 10px 20px;
  background: linear-gradient(135deg, #FFD700, #FFA500);
  color: black;
  border: none;
  cursor: pointer;
  font-weight: bold;
  margin: 5px;
  border-radius: 5px;
  transition: all 0.3s;
  animation: buttonBreath 2.8s ease-in-out infinite;
}

button:hover:not(:disabled) {
  transform: translateY(-2px);
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed !important;
}

#status {
  color: #FFD700;
  font-size: 20px;
  font-weight: bold;
  margin: 20px 0;
  animation: statusGlow 1.8s ease-in-out infinite;
}

.game-wrapper {
  display: flex;
  justify-content: center;
  gap: 20px;
}

.panel {
  background: linear-gradient(135deg, #1a1a2b, #0f0f1a);
  border: 2px solid #FFD700;
  padding: 20px;
  border-radius: 10px;
  width: 280px;
  max-height: 500px;
  overflow-y: auto;
  transition: all 0.3s;
  animation: panelFloat 4.6s ease-in-out infinite;
}

.panel:nth-child(1) { animation-delay: 0s; }
.panel:nth-child(2) { animation-delay: 0.7s; }
.panel:nth-child(3) { animation-delay: 1.4s; }

.panel.active {
  box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
  transform: scale(1.05);
}

.panel h3 {
  color: #FFD700;
  margin-bottom: 15px;
}

.char-item {
  background: rgba(255, 215, 0, 0.1);
  padding: 10px;
  margin: 8px 0;
  border-left: 3px solid #FFD700;
  text-align: left;
  border-radius: 5px;
  font-size: 12px;
  display: flex;
  gap: 10px;
}

.char-item img {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  border: 2px solid #FFD700;
  object-fit: cover;
  background: #333;
}

.char-item img.glow-6 { box-shadow: 0 0 8px rgba(100, 200, 255, 0.6); }
.char-item img.glow-7 { box-shadow: 0 0 10px rgba(0, 255, 150, 0.7); }
.char-item img.glow-8 { box-shadow: 0 0 12px rgba(255, 200, 0, 0.8); }
.char-item img.glow-9 { box-shadow: 0 0 14px rgba(255, 100, 0, 0.9); animation: glow-pulse 1.5s infinite; }
.char-item img.glow-10 { box-shadow: 0 0 22px rgba(255, 0, 120, 1), 0 0 45px rgba(255, 60, 160, 0.95), 0 0 70px rgba(255, 220, 90, 0.85); animation: glow-pulse 0.9s infinite; filter: saturate(1.25) brightness(1.15); }

@keyframes glow-pulse {
  0%, 100% { box-shadow: 0 0 22px rgba(255, 0, 120, 1), 0 0 48px rgba(255, 40, 130, 0.9), 0 0 72px rgba(255, 220, 90, 0.75); }
  50% { box-shadow: 0 0 28px rgba(255, 0, 140, 1), 0 0 62px rgba(255, 80, 180, 0.95), 0 0 86px rgba(255, 235, 130, 0.9); }
}

.char-item.traitor {
  background: rgba(255, 68, 68, 0.1);
  border-left-color: #FF4444;
}

.char-item.traitor img {
  border-color: #FF4444;
  box-shadow: 0 0 12px rgba(255, 68, 68, 0.8);
}

.char-info { flex: 1; }
.char-item strong { color: #FFD700; display: block; }
.char-item span { color: #88CCFF; font-size: 10px; display: block; margin-top: 2px; }
.char-item.traitor span { color: #FF4444; }

.ability-badge {
  display: inline-block;
  background: rgba(255, 215, 0, 0.15);
  border: 1px solid #FFD700;
  border-radius: 3px;
  padding: 2px 6px;
  font-size: 9px;
  color: #FFD700;
  margin-top: 4px;
  font-weight: bold;
}

.score {
  color: #FFD700;
  font-weight: bold;
  margin-top: 15px;
  padding: 10px;
  background: rgba(255, 215, 0, 0.1);
  border-radius: 5px;
}

.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  overflow-y: auto;
  padding: 20px;
}

.popup-content {
  background: linear-gradient(135deg, #1a1a2b, #0f0f1a);
  border: 3px solid #FFD700;
  border-radius: 15px;
  padding: 40px;
  text-align: center;
  max-width: 420px;
  animation: popupAppear 0.5s ease-out;
  max-height: 90vh;
  overflow-y: auto;
}

@keyframes popupAppear {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

.popup-img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 3px solid #FFD700;
  margin-bottom: 20px;
  object-fit: cover;
  background: #333;
}

.popup-content h2 {
  color: #FFD700;
  font-size: 32px;
  margin-bottom: 15px;
}

.popup-content p {
  color: #88CCFF;
  margin-bottom: 10px;
}

.attributes-grid {
  background: rgba(0, 0, 0, 0.3);
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.attribute {
  margin: 8px 0;
  text-align: left;
  font-size: 12px;
}

.attribute-name {
  color: #FFD700;
  font-weight: bold;
  display: inline-block;
  width: 60px;
}

.attribute-bar {
  display: inline-block;
  width: 120px;
  height: 8px;
  background: rgba(255, 215, 0, 0.2);
  border-radius: 4px;
  overflow: hidden;
  margin: 0 5px;
  vertical-align: middle;
}

.attribute-fill {
  height: 100%;
  background: linear-gradient(90deg, #FFD700, #FFA500);
}

.attribute-value {
  color: #88CCFF;
  font-weight: bold;
  display: inline-block;
  width: 30px;
  text-align: right;
}

.roles {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 15px;
}

.roles button {
  padding: 12px 10px;
  font-size: 12px;
  position: relative;
}

.roles button.taken {
  background: #666 !important;
  color: #999 !important;
  cursor: not-allowed !important;
}

.roles button.taken::after {
  content: "✓";
  position: absolute;
  top: 2px;
  right: 5px;
  color: #00FF00;
  font-weight: bold;
}

.volume-control {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 100;
  background: rgba(0, 0, 0, 0.72);
  padding: 8px;
  border-radius: 10px;
  border: 2px solid #FFD700;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  max-width: min(92vw, 560px);
  justify-content: flex-end;
}

.volume-control button {
  background: #FFD700;
  color: black;
  padding: 6px 10px;
  font-size: 11px;
  margin: 0;
  line-height: 1.1;
}

.quit-btn {
  background: #FF4444 !important;
  color: white !important;
}

.rules-btn {
  background: #00BFFF !important;
  color: white !important;
}

.leaderboard-btn {
  background: #FFB90F !important;
  color: black !important;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 10px;
}

.chat-box {
  margin: 20px auto 0;
  width: 100%;
  max-width: 900px;
  border: 2px solid #00BFFF;
  border-radius: 12px;
  background: rgba(8, 15, 30, 0.72);
  padding: 12px;
  text-align: left;
}

.chat-header {
  color: #00BFFF;
  font-weight: bold;
  margin-bottom: 8px;
}

.chat-messages {
  max-height: 160px;
  overflow-y: auto;
  border: 1px solid rgba(0, 191, 255, 0.35);
  border-radius: 8px;
  padding: 8px;
  background: rgba(0, 0, 0, 0.28);
}

.chat-empty {
  color: #88CCFF;
  opacity: 0.85;
  font-size: 12px;
}

.chat-line {
  font-size: 12px;
  margin-bottom: 6px;
  color: #D9EEFF;
  line-height: 1.4;
}

.chat-line .name {
  color: #FFD700;
  font-weight: bold;
}

.chat-line .time {
  color: #88CCFF;
  font-size: 10px;
  margin-left: 6px;
}

.chat-input-row {
  margin-top: 10px;
  display: flex;
  gap: 8px;
}

#chatInput {
  flex: 1;
  padding: 10px 12px;
  border: 1px solid #00BFFF;
  border-radius: 8px;
  background: #0b1326;
  color: white;
  font-size: 12px;
}

#chatSendBtn {
  background: #00BFFF;
  color: #001018;
  padding: 10px 14px;
}

.character-counter {
  background: rgba(0, 150, 200, 0.3);
  padding: 10px 20px;
  border-radius: 10px;
  border: 2px solid #00BFFF;
  color: #00BFFF;
  font-weight: bold;
}

.odds-inline {
  margin-top: 10px;
  font-size: 12px;
  opacity: 0.92;
  width: fit-content;
}

.winner-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.98);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10000;
  padding: 20px;
}

.winner-content {
  background: linear-gradient(135deg, #FFD700, #FFA500);
  border: 5px solid #FF0000;
  border-radius: 20px;
  padding: 60px 40px;
  text-align: center;
  max-width: 500px;
  box-shadow: 0 0 100px rgba(255, 215, 0, 0.8);
  animation: winnerAppear 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
}

@keyframes winnerAppear {
  0% { transform: scale(0) rotate(-180deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

.winner-content h1 {
  color: #FF0000;
  font-size: 48px;
  margin-bottom: 20px;
}

.winner-name {
  color: #0a0a14;
  font-size: 36px;
  font-weight: bold;
  margin: 20px 0;
}

.winner-score {
  color: #0a0a14;
  font-size: 28px;
  font-weight: bold;
}

.loser-info {
  background: rgba(0, 0, 0, 0.3);
  padding: 20px;
  border-radius: 10px;
  margin-top: 30px;
  color: #0a0a14;
}

.winning-draft {
  margin-top: 24px;
  text-align: left;
  background: rgba(10, 10, 20, 0.35);
  border: 2px solid rgba(0,0,0,0.35);
  border-radius: 12px;
  padding: 14px;
}

.winning-draft h3 {
  color: #0a0a14;
  margin-bottom: 10px;
  font-size: 18px;
}

.winning-draft-list {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
}

.winning-draft-item {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(10,10,20,0.25);
  border-radius: 8px;
  padding: 8px 10px;
  color: #0a0a14;
  font-size: 13px;
}

.winning-draft-role {
  font-weight: bold;
}

.winning-draft-empty {
  color: #0a0a14;
  opacity: 0.75;
  font-size: 13px;
}

.winner-buttons {
  display: flex;
  gap: 15px;
  justify-content: center;
  margin-top: 40px;
}

.winner-buttons button {
  padding: 15px 30px;
  font-size: 16px;
  background: #FF0000 !important;
  color: white !important;
}

.rules-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9998;
  overflow-y: auto;
  padding: 20px;
}

.rules-content {
  background: linear-gradient(135deg, #1a1a2b, #0f0f1a);
  border: 3px solid #FFD700;
  border-radius: 15px;
  padding: 40px;
  max-width: 600px;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 0 60px rgba(0,0,0,0.9), 0 0 40px rgba(255,215,0,0.3);
  animation: popupAppear 0.5s ease-out;
}

.rules-content h2 {
  color: #FFD700;
  font-size: 28px;
  margin-bottom: 20px;
}

.rule-section {
  margin-bottom: 20px;
  text-align: left;
  background: rgba(255, 215, 0, 0.05);
  padding: 15px;
  border-left: 3px solid #FFD700;
  border-radius: 5px;
}

.rule-section h3 {
  color: #00FF96;
  margin-bottom: 10px;
  font-size: 16px;
}

.rule-section p {
  color: #88CCFF;
  line-height: 1.6;
  font-size: 14px;
  margin-bottom: 8px;
}

.rule-section ul {
  color: #88CCFF;
  margin-left: 20px;
  font-size: 14px;
  line-height: 1.8;
}

.rule-section li {
  margin-bottom: 8px;
}

.rule-section li strong {
  color: #FFD700;
}

.collapsible-block {
  margin-bottom: 12px;
  border: 1px solid rgba(255, 215, 0, 0.35);
  border-radius: 8px;
  background: rgba(0, 0, 0, 0.2);
  overflow: hidden;
}

.collapsible-block summary {
  cursor: pointer;
  list-style: none;
  padding: 12px 14px;
  color: #FFD700;
  font-weight: bold;
  background: rgba(255, 215, 0, 0.08);
}

.collapsible-block summary::-webkit-details-marker {
  display: none;
}

.collapsible-content {
  padding: 12px 14px;
}

.modal-close {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #FFD700;
  color: black;
  border: none;
  width: 35px;
  height: 35px;
  border-radius: 50%;
  cursor: pointer;
  font-weight: bold;
  font-size: 24px;
  transition: all 0.3s;
  z-index: 10000;
}

.modal-close:hover {
  transform: scale(1.1);
}

.leaderboard-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9998;
  overflow-y: auto;
  padding: 20px;
}

.leaderboard-content {
  background: linear-gradient(135deg, #1a1a2b, #0f0f1a);
  border: 3px solid #FFB90F;
  border-radius: 15px;
  padding: 40px;
  max-width: 600px;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 0 60px rgba(0,0,0,0.9), 0 0 40px rgba(255,185,15,0.3);
  animation: popupAppear 0.5s ease-out;
}

.leaderboard-content h2 {
  color: #FFB90F;
  font-size: 28px;
  margin-bottom: 20px;
}

.leaderboard-table {
  width: 100%;
  border-collapse: collapse;
}

.leaderboard-table thead {
  background: rgba(255, 185, 15, 0.1);
  border-bottom: 2px solid #FFB90F;
}

.leaderboard-table th {
  color: #FFB90F;
  padding: 12px;
  text-align: left;
  font-weight: bold;
  font-size: 14px;
}

.leaderboard-table td {
  color: #88CCFF;
  padding: 12px;
  border-bottom: 1px solid rgba(255, 185, 15, 0.2);
  font-size: 13px;
}

.leaderboard-table tr:hover {
  background: rgba(255, 185, 15, 0.05);
}

.rank-1 { background: rgba(255, 215, 0, 0.15) !important; }
.rank-2 { background: rgba(192, 192, 192, 0.15) !important; }
.rank-3 { background: rgba(205, 127, 50, 0.15) !important; }

.medal {
  font-size: 18px;
  margin-right: 8px;
}

.leaderboard-name {
  color: #FFD700;
  font-weight: bold;
}

.leaderboard-stat {
  text-align: center;
}

.leaderboard-stat.wins {
  color: #00FF96;
  font-weight: bold;
}

.leaderboard-stat.winrate {
  color: #FFD700;
}

.no-data {
  text-align: center;
  color: #88CCFF;
  padding: 40px 20px;
  font-size: 14px;
}

.particle-burst {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 10001;
}

.particle {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  opacity: 0;

function getAudioContext() {
  if (!audioContext) {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    audioContext = new AudioContext();
  }
  return audioContext;
}

function playToneSequence(notes = [], options = {}) {
  try {
    const ctx = getAudioContext();
    const wave = options.wave || 'sine';
    const spacing = options.spacing ?? 80;
    const volume = options.volume ?? 0.26;
    const attack = options.attack ?? 0.005;
    const releasePad = options.releasePad ?? 0.01;
    const pitchBend = options.pitchBend || 0;

    notes.forEach((note, idx) => {
      const freq = typeof note === 'number' ? note : note.freq;
      const duration = Math.max(0.04, typeof note === 'number' ? (options.defaultDuration || 0.12) : (note.duration || options.defaultDuration || 0.12));
      const noteVolume = typeof note === 'number' ? volume : (note.volume ?? volume);
      const noteWave = typeof note === 'number' ? wave : (note.wave || wave);
      const detune = typeof note === 'number' ? 0 : (note.detune || 0);

      setTimeout(() => {
        try {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          const now = ctx.currentTime;
          osc.connect(gain);
          gain.connect(ctx.destination);

          osc.type = noteWave;
          osc.frequency.setValueAtTime(freq, now);
          osc.detune.setValueAtTime(detune, now);
          if (pitchBend) {
            osc.frequency.exponentialRampToValueAtTime(Math.max(30, freq + pitchBend), now + duration);
          }

          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, noteVolume), now + attack);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + duration + releasePad);

          osc.start(now);
          osc.stop(now + duration + releasePad + 0.005);
        } catch(e) {}
      }, idx * spacing);
    });
  } catch(e) {}
}

function playNoiseBurst(duration = 0.08, volume = 0.05) {
  try {
    const ctx = getAudioContext();
    const bufferSize = Math.max(1, Math.floor(ctx.sampleRate * duration));
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - (i / bufferSize));

    const source = ctx.createBufferSource();
    source.buffer = buffer;

    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 900;

    const gain = ctx.createGain();
    const now = ctx.currentTime;
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

    source.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    source.start(now);
    source.stop(now + duration + 0.02);
  } catch(e) {}
}

function playSound(frequencies, durations) {
  const notes = frequencies.map((freq, i) => ({ freq, duration: durations?.[i] || 0.12 }));
  playToneSequence(notes, { wave: 'sine', spacing: 80, volume: 0.26 });
}

    playNoiseBurst(0.12, 0.045);
  }
  else if (type === 'skip') playToneSequence([{freq:610,duration:0.08,wave:'square'},{freq:430,duration:0.13,wave:'triangle'}], {spacing:95, volume:0.2});
  else if (type === 'turn') playToneSequence([{freq:440,duration:0.1,wave:'sine'},{freq:554,duration:0.12,wave:'sine'}], {spacing:80, volume:0.2});
  else if (type === 'error') playToneSequence([{freq:160,duration:0.1,wave:'sawtooth'},{freq:110,duration:0.11,wave:'square'}], {spacing:70, volume:0.2});
  else if (type === 'ultimate') playToneSequence([{freq:360,duration:0.09,wave:'sawtooth'},{freq:540,duration:0.12,wave:'sawtooth'},{freq:760,duration:0.16,wave:'triangle'},{freq:1080,duration:0.2,wave:'sine'}], {spacing:55, volume:0.3, pitchBend: 20});
  else if (type === 'win') {
    playToneSequence([{freq:523,duration:0.12,wave:'triangle'},{freq:659,duration:0.12,wave:'triangle'},{freq:784,duration:0.15,wave:'triangle'},{freq:1047,duration:0.28,wave:'sine'}], {spacing:85, volume:0.28});
    setTimeout(() => playNoiseBurst(0.1, 0.03), 120);
  }
  else if (type === 'chat') playToneSequence([{freq:740,duration:0.05,wave:'sine'},{freq:880,duration:0.06,wave:'triangle'}], {spacing:45, volume:0.12});
  else if (type === 'hover') playToneSequence([{freq:580,duration:0.03,wave:'sine',volume:0.06}], {spacing:0});
  else if (type === 'click') playToneSequence([{freq:460,duration:0.04,wave:'triangle',volume:0.08}], {spacing:0});
}

function bindDynamicUiSounds() {
  if (uiSoundBound) return;
  uiSoundBound = true;

  let lastHoverAt = 0;
  document.addEventListener('mouseover', (e) => {
    const target = e.target;
    if (!(target instanceof HTMLElement)) return;
    if (!target.closest('button')) return;
    const now = Date.now();
    if (now - lastHoverAt < 90) return;
    lastHoverAt = now;
    playSoundEffect('hover');
  });

  document.addEventListener('click', (e) => {
    const target = e.target;
    if (!(target instanceof HTMLElement)) return;
    if (target.closest('button')) playSoundEffect('click');
  });
}

function activateUltimate() {
  if (state.ultimateUsed || !state.room || !state.player) return;
  if (!state.myTurn) {
    playSoundEffect('error');
    showMessage("❌ You can only use Ultimate on your turn!", "error");
    return;
  }
  if (!state.hasSpunThisTurn) {
    playSoundEffect('error');
    showMessage("❌ Spin first, then use Ultimate.", "error");
    return;
  }

  db.ref(`rooms/${state.room}/players/${state.player}/slots`)
    .once("value")
    .then(snapshot => {
      const mySlots = snapshot.val() || {};
      const names = Object.values(mySlots).map(c => c.name);

      let bonus = 0;
      let ultimateName = "Power Surge";

      if (names.includes("Naruto") && names.includes("Sasuke")) {
        bonus = 8;
        ultimateName = "Six Paths Awakening";
      } else if (names.includes("Ichigo") && names.includes("Byakuya")) {
        bonus = 7;
        ultimateName = "Soul Society Unity";
      } else if (names.includes("Yamamoto")) {
        bonus = 6;
        ultimateName = "Final Inferno";
      } else if (names.includes("Asta")) {
        bonus = 5;
        ultimateName = "Devil Union Mode";
      } else {
        bonus = 4;
        ultimateName = "Adrenaline Rush";
      }

      return db.ref(`rooms/${state.room}/ultimateBonus/${state.player}`).set(bonus)
        .then(() => {
          state.ultimateUsed = true;
          playSoundEffect('ultimate');
          ultimateBtn.disabled = true;

async function showLeaderboard() {

  };

    const snapshot = await db.ref('leaderboard').orderByChild('wins').limitToLast(100).once('value');
    const data = snapshot.val();
    
    if (!data) {
      document.getElementById("leaderboardData").innerHTML = `<div class="no-data">No games played yet!</div>`;
      return;
    }

    const players = Object.values(data).sort((a, b) => b.wins - a.wins);

    let html = `<table class="leaderboard-table"><thead><tr><th>RANK</th><th>PLAYER</th><th>WINS</th><th>LOSSES</th><th>WIN RATE</th></tr></thead><tbody>`;

    topPlayers.forEach((player, index) => {
      const totalGames = (player.wins || 0) + (player.losses || 0);
      const winRate = totalGames > 0 ? ((player.wins || 0) / totalGames * 100).toFixed(1) : "0.0";
      const medals = ['🥇', '🥈', '🥉'];
      const medal = medals[index] || '';
      const rowClass = index < 3 ? `rank-${index + 1}` : '';

      html += `<tr class="${rowClass}"><td>${medal} ${index + 1}</td><td><span class="leaderboard-name">${player.name}</span></td><td class="leaderboard-stat wins">${player.wins || 0}</td><td>${player.losses || 0}</td><td class="leaderboard-stat winrate">${winRate}%</td></tr>`;
    });

    html += `</tbody></table>`;
    document.getElementById("leaderboardData").innerHTML = html;
  } catch(e) {
    document.getElementById("leaderboardData").innerHTML = `<div class="no-data">Error loading leaderboard</div>`;
  }
}

async function updateLeaderboard(winnerName, loserName) {
  try {
    const leaderboardRef = db.ref('leaderboard');
    const winnerSnapshot = await leaderboardRef.orderByChild('name').equalTo(winnerName).once('value');
    if (winnerSnapshot.exists()) {
      const winnerKey = Object.keys(winnerSnapshot.val())[0];
      const winnerData = winnerSnapshot.val()[winnerKey];
      await leaderboardRef.child(winnerKey).update({wins: (winnerData.wins || 0) + 1});
    } else {
      await leaderboardRef.push({name: winnerName, wins: 1, losses: 0});
    }

    const loserSnapshot = await leaderboardRef.orderByChild('name').equalTo(loserName).once('value');
    if (loserSnapshot.exists()) {
      const loserKey = Object.keys(loserSnapshot.val())[0];
      const loserData = loserSnapshot.val()[loserKey];
      await leaderboardRef.child(loserKey).update({losses: (loserData.losses || 0) + 1});
    } else {
      await leaderboardRef.push({name: loserName, wins: 0, losses: 1});
    }
  } catch(e) {
    console.error("Leaderboard error:", e);
  }
}

function escapeHtml(text) {
  return String(text || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function loadImage(imagePath) {

    const img = new Image();
    img.onload = () => {
      state.images[imagePath] = img;
      resolve(img);
    };
    img.onerror = () => resolve(null);
    img.src = imagePath;
  });
}

function draw() {
  const chars = state.characters;
  if (chars.length === 0) return;

  const centerX = 160;
  const centerY = 160;
  const radius = 130;
  const slice = (Math.PI * 2) / chars.length;

  ctx.fillStyle = "#0a0a12";
  ctx.fillRect(0, 0, 320, 320);

  for (let i = 0; i < chars.length; i++) {
    const start = state.angle + i * slice;
    const end = start + slice;
    const mid = start + slice / 2;

    ctx.fillStyle = "#1a3a5f";
    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.arc(centerX, centerY, radius, start, end);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "#FFD700";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.save();
    ctx.translate(centerX, centerY);
    ctx.rotate(mid);
    ctx.fillStyle = "#FFD700";
    ctx.font = "bold 9px Arial";
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";
    ctx.fillText(chars[i].name, radius - 35, 0);
    ctx.restore();

    const img = state.images[chars[i].img];
    if (img && img.complete) {
      const x = centerX + Math.cos(mid) * 95;
      const y = centerY + Math.sin(mid) * 95;

      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y, 14, 0, Math.PI * 2);
      ctx.strokeStyle = "#FFD700";
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.clip();
      ctx.drawImage(img, x - 14, y - 14, 28, 28);
      ctx.restore();
    } else {
      const x = centerX + Math.cos(mid) * 95;
      const y = centerY + Math.sin(mid) * 95;
      ctx.fillStyle = "#333";
      ctx.beginPath();
      ctx.arc(x, y, 14, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#FFD700";
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  ctx.fillStyle = "#0a0a12";
  ctx.beginPath();
  ctx.arc(centerX, centerY, 25, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = "#FFD700";
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = "#FFD700";
  ctx.font = "bold 16px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("⚡", centerX, centerY);
}

function spin() {
  if (state.spinning) return;
  if (!state.myTurn) {
    playSoundEffect('error');
    showMessage("❌ Not your turn!", "error");
    return;
  }
  if (state.characters.length === 0) {
    playSoundEffect('error');
    showMessage("❌ No characters left!", "error");
    return;
  }
  if (hasAllRolesSelected()) {
    playSoundEffect('error');
    showMessage("✅ All 7 roles are filled. No more spins for you!", "success");
    spinBtn.disabled = true;
    return;
  }

  playSoundEffect('spin');
  state.spinning = true;
  spinBtn.disabled = true;

  let speed = 0.2;
  let count = 0;
  const maxSpins = 260;
  let inFinalApproach = false;
  let targetAngle = null;
  let lastTickAt = 0;

  const normalize = (a) => ((a % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  const shortestDiff = (to, from) => {
    let d = normalize(to) - normalize(from);
    if (d > Math.PI) d -= Math.PI * 2;
    if (d < -Math.PI) d += Math.PI * 2;
    return d;
  };

  let spinInterval = setInterval(() => {
    const slice = (Math.PI * 2) / state.characters.length;

    if (!inFinalApproach) {
      state.angle += speed;
      speed *= 0.982;

      // Near-miss feedback: tick intensifies near high rarity targets
      const normalized = normalize(state.angle);
      const index = Math.floor(normalized / slice) % state.characters.length;
      const pointerChar = state.characters[index];
      const isHigh = (pointerChar?.score || 0) >= 9;
      const now = Date.now();
      const tickGap = isHigh ? 90 : 150;
      if (now - lastTickAt > tickGap && speed > 0.03) {
        playSoundEffect('spinTick', { high: isHigh });
        lastTickAt = now;
      }

      // Enter slow-motion final 15 degrees, then snap
      if (speed < 0.045 || count > maxSpins - 60) {
        inFinalApproach = true;
        const finalIndex = Math.floor(normalized / slice) % state.characters.length;
        targetAngle = finalIndex * slice + 0.0001;
      }
    } else {
      const diff = shortestDiff(targetAngle, state.angle);
      state.angle += diff * 0.14;
      if (Math.abs(diff) < (15 * Math.PI / 180)) {
        state.angle += diff * 0.2;
      }
      if (Math.abs(diff) < 0.012) {
        state.angle = targetAngle;
      }
    }

    count++;
    draw();

    const doneBySnap = inFinalApproach && Math.abs(shortestDiff(targetAngle, state.angle)) < 0.012;
    if (doneBySnap || count >= maxSpins) {
      clearInterval(spinInterval);

      const normalized = normalize(state.angle);
      const index = Math.floor(normalized / slice) % state.characters.length;
      const selected = state.characters[index];
      const selectedWithForm = applyFormVariation(selected);
      state.hasSpunThisTurn = true;
      if ((selectedWithForm.score || 0) >= 10) state.pityCounter = 0;
      else state.pityCounter += 1;

      const reveal = () => {
        playSoundEffect((selectedWithForm.score || 0) >= 10 ? 'selectLegendary' : 'select');
        playRareCinematic(selectedWithForm);
        showPopup(selectedWithForm);
        updateOddsDisplay();
        state.spinning = false;
        spinBtn.disabled = false;
      };

      if ((selectedWithForm.score || 0) >= 10) {
        playSummonSequence(selectedWithForm, reveal);
      } else {
        reveal();
      }
    }
  }, 16);
}


function triggerSpecialParticleBurst(char) {
  const isSpecial = (char.score >= 10) || Boolean(char.ability) || Boolean(char.formLabel);
  if (!isSpecial) return;

  const burstLayer = document.createElement("div");
  burstLayer.className = "particle-burst";
  document.body.appendChild(burstLayer);

  const colors = ["#FFD700", "#FF4DA6", "#00E5FF", "#FFFFFF", "#FFA500"];
  const centerX = window.innerWidth / 2;
  const centerY = window.innerHeight / 2;
  const particleCount = char.score >= 10 ? 38 : 24;

  for (let i = 0; i < particleCount; i++) {
    const particle = document.createElement("div");
    particle.className = "particle";
    particle.style.left = `${centerX}px`;
    particle.style.top = `${centerY}px`;
    particle.style.background = colors[Math.floor(Math.random() * colors.length)];
    const angle = (Math.PI * 2 * i) / particleCount + (Math.random() * 0.4 - 0.2);
    const distance = 70 + Math.random() * 180;
    particle.style.setProperty("--dx", `${Math.cos(angle) * distance}px`);
    particle.style.setProperty("--dy", `${Math.sin(angle) * distance}px`);
    particle.style.animationDelay = `${Math.random() * 90}ms`;
    burstLayer.appendChild(particle);
  }

  setTimeout(() => burstLayer.remove(), 1200);
}

function selectRole(role, popup, char) {
  db.ref(`rooms/${state.room}/players/${state.player}/slots/${role}`).set(char).then(() => {
    state.characters = state.characters.filter(c => c.name !== char.name);
    state.myFilledRoles[role] = true;
    popup.remove();
    document.getElementById("charCounter").innerText = state.characters.length;
    draw();

    state.hasSpunThisTurn = false;
    state.skippedThisTurn = false;

    return db.ref(`rooms/${state.room}/players`).once("value").then(snap => {
      const players = snap.val() || {};
      const p1Slots = players.Player1?.slots || {};
      const p2Slots = players.Player2?.slots || {};
      const defaultNext = state.player === "Player1" ? "Player2" : "Player1";
      const next = getNextTurnByDraftProgress(p1Slots, p2Slots, defaultNext);
      return db.ref(`rooms/${state.room}/turn`).set(next);
    });
  }).catch(err => {
    showMessage("Error: " + err.message, "error");
    console.error(err);
  });
}

function skipTurn() {
  if (!state.myTurn) {
    playSoundEffect('error');
    showMessage("❌ Not your turn!", "error");
    return;
  }
  if (state.skippedThisTurn) {
    playSoundEffect('error');
    showMessage("❌ You can only skip once per turn!", "error");
    return;
  }

  const completedAllRoles = hasAllRolesSelected();
  const currentPenalty = state.skipPenalties[state.player] || 0;

  if (!completedAllRoles && !state.hasSpunThisTurn) {
    playSoundEffect('error');
    showMessage("❌ Spin the wheel before skipping!", "error");
    return;
  }

  playSoundEffect('skip');
  state.skippedThisTurn = true;

  if (!completedAllRoles) {
    const updatedPenalty = currentPenalty + 1;
    state.skipPenalties[state.player] = updatedPenalty;
    db.ref(`rooms/${state.room}/skipPenalties/${state.player}`).set(updatedPenalty);
  }

  const defaultNext = state.player === "Player1" ? "Player2" : "Player1";
  db.ref(`rooms/${state.room}/players`).once("value").then(snap => {
    const players = snap.val() || {};
    const p1Slots = players.Player1?.slots || {};
    const p2Slots = players.Player2?.slots || {};
    const next = getNextTurnByDraftProgress(p1Slots, p2Slots, defaultNext);
    return db.ref(`rooms/${state.room}/turn`).set(next);
  }).catch(err => {
    showMessage("❌ Skip update failed: " + err.message, "error");
  });
}

function calculateScore(slots, enemySlots = {}, ultimateBonus = 0) {
  let score = 0;
  const ownChars = Object.values(slots || {});
  const enemyChars = Object.values(enemySlots || {});

  const hasEnemyFreeze = enemyChars.some(c => c.ability?.type === "statusEffect" && c.ability?.effect === "Freeze");
  const hasEnemySilence = enemyChars.some(c => c.ability?.type === "statusEffect" && c.ability?.effect === "Silence");
  const burnStacks = enemyChars.filter(c => c.ability?.type === "statusEffect" && c.ability?.effect === "Burn").length;

  const effectsDisabled = hasEnemyFreeze || hasEnemySilence;

  const roleBaseValue = (role, char) => {
    let val = char.score;
    if (char.ability?.type !== "ignoreRole" || effectsDisabled) {
      if (role === "Captain") val = Math.floor(val * 1.5);
      else if (role === "Vice") val = Math.floor(val * 1.2);
      else if (role === "Healer" || role === "Support") val += 2;
      else if (role === "Tank" || role === "Duelist") val += 1;
      else if (role === "Traitor") val = -char.score;
    }
    val += Math.floor((char.strength + char.speed + char.defense + char.stamina) * 0.1);
    return val;
  };

  let teamMultiplier = 0;
  let lateGameBonus = 0;
  let stealExpected = 0;

  Object.entries(slots).forEach(([role, char]) => {
    let base = roleBaseValue(role, char);

    if (!effectsDisabled && char.ability?.type === "roleBonus" && role === char.ability.role) {
      base += char.ability.value;
    }

    if (!effectsDisabled && char.ability?.type === "healingMastery") {
      if (role === "Healer") base += (char.ability.healerValue || 0);
      else if (role === "Support") base += (char.ability.supportValue || 0);
    }

    if (!effectsDisabled && char.passiveAbility?.type === "flatBonus") {
      base += char.passiveAbility.value;
    }

    if (!effectsDisabled && char.ability?.type === "teamMultiplier" && (char.score || 0) >= (char.ability.threshold || 9)) {
      teamMultiplier = Math.max(teamMultiplier, char.ability.multiplier || 0);
    }

    if (!effectsDisabled && char.ability?.type === "lateGame" && Object.keys(slots).length >= (char.ability.minRoles || 5)) {
      lateGameBonus += (char.ability.value || 0);
    }

    score += base;
  });

  // Team set bonus: drafting 3+ from same anime series grants buffs
  const seriesCounts = {};
  ownChars.forEach(char => {
    const series = SERIES_MAP[char.name];
    if (!series) return;
    seriesCounts[series] = (seriesCounts[series] || 0) + 1;
  });
  Object.values(seriesCounts).forEach(count => {
    if (count >= 3) score += 5;
  });

  const ownShields = effectsDisabled ? 0 : ownChars.filter(c => c.ability?.type === "shield").length;
  const enemyDebuffTotal = enemyChars
    .filter(c => c.ability?.type === "enemyDebuff")
    .reduce((sum, c) => sum + (c.ability.value || 0), 0);
  score -= Math.max(0, enemyDebuffTotal - ownShields);

  // Steal (expected value): chance to steal opponent's lowest role score
  if (!effectsDisabled) {
    const enemyRoleValues = Object.entries(enemySlots || {}).map(([r, c]) => roleBaseValue(r, c)).filter(v => v > 0);
    const lowestEnemyRole = enemyRoleValues.length ? Math.min(...enemyRoleValues) : 0;
    ownChars.forEach(char => {
      if (char.ability?.type === "steal") {
        const chance = char.ability.chance || 0;
        const factor = char.ability.factor || 1;
        stealExpected += Math.floor(lowestEnemyRole * chance * factor);
      }
    });
  }

  score += lateGameBonus;
  score += stealExpected;

  if (!effectsDisabled && teamMultiplier > 0) {
    score = Math.floor(score * (1 + teamMultiplier));
  }

  // Team pair bonuses are disabled while frozen/silenced
  if (!effectsDisabled) {
    const teamNames = ownChars.map(c => c.name);
    ownChars.forEach(char => {
      if (char.ability?.type === "teamPair" && teamNames.includes(char.ability.partner)) {
        score += char.ability.value;
      }
    });
  }

  // Burn is a simple status that chips team score
  if (burnStacks > 0) {
    score -= burnStacks * 3;
  }

  // Apply ultimate bonus
  score += ultimateBonus;

  return score;
}

function getTeamThemeFromSlots(slots) {
  const counters = { strength: 0, speed: 0, defense: 0, stamina: 0 };

  Object.values(slots || {}).forEach(char => {
    const stats = {
      strength: char.strength || 0,
      speed: char.speed || 0,
      defense: char.defense || 0,
      stamina: char.stamina || 0
    };

    const entries = Object.entries(stats).sort((a, b) => b[1] - a[1]);
    if (!entries.length) return;

    const top = entries[0][1];
    const tied = entries.filter(([, value]) => value === top).map(([name]) => name);
    tied.forEach(name => { counters[name] += 1 / tied.length; });
  });

  const sorted = Object.entries(counters).sort((a, b) => b[1] - a[1]);
  if (!sorted.length || sorted[0][1] <= 0) return "balanced";

  if (sorted.length > 1 && Math.abs(sorted[0][1] - sorted[1][1]) < 0.35) {
    return "balanced";
  }

  return sorted[0][0];
}

function applyTeamTheme(slots) {
  const theme = getTeamThemeFromSlots(slots);
  document.body.classList.remove("theme-strength", "theme-speed", "theme-defense", "theme-stamina", "theme-balanced");
  document.body.classList.add(`theme-${theme}`);
}

function updateGameDisplay(data) {
  if (!data || !data.players) return;
  refreshCachedUltimateBonus();
  renderChatMessages(data.chat || {});
  updateOddsDisplay();
  if (window.innerWidth <= 900) setMobileTab(state.mobileTab || "wheel");

  const p1 = data.players.Player1?.slots || {};
  const p2 = data.players.Player2?.slots || {};
  const p1UltimateBonus = data.ultimateBonus?.Player1 || 0;
  const p2UltimateBonus = data.ultimateBonus?.Player2 || 0;
  const p1SkipPenalty = data.skipPenalties?.Player1 || 0;
  const p2SkipPenalty = data.skipPenalties?.Player2 || 0;
  state.skipPenalties.Player1 = p1SkipPenalty;
  state.skipPenalties.Player2 = p2SkipPenalty;

  const effectiveP1UltimateBonus = state.player === "Player1" ? Math.max(p1UltimateBonus, state.cachedUltimateBonus || 0) : p1UltimateBonus;
  const effectiveP2UltimateBonus = state.player === "Player2" ? Math.max(p2UltimateBonus, state.cachedUltimateBonus || 0) : p2UltimateBonus;

  if (state.player === "Player1") {
    state.myFilledRoles = p1;
    applyTeamTheme(p1);
  }
  else if (state.player === "Player2") {
    state.myFilledRoles = p2;
    applyTeamTheme(p2);
  }

  const p1Count = Object.keys(p1).length;
  const p2Count = Object.keys(p2).length;
  const forcedTurn = getForcedTurnFromCounts(p1Count, p2Count);
  if (forcedTurn && data.turn !== forcedTurn && !state.gameEnded) {
    db.ref(`rooms/${state.room}/turn`).set(forcedTurn).catch(() => {});
  }

  const myCount = state.player === "Player1" ? p1Count : p2Count;
  const enemyCount = state.player === "Player1" ? p2Count : p1Count;
  const iCompletedDraft = myCount >= ROLES.length;
  const enemyStillDrafting = enemyCount < ROLES.length;

  // Safety auto-pass: if completed player still owns turn, force handoff to unfinished player
  if (!state.gameEnded && iCompletedDraft && enemyStillDrafting && data.turn === state.player) {
    const enemy = state.player === "Player1" ? "Player2" : "Player1";
    db.ref(`rooms/${state.room}/turn`).set(enemy).catch(() => {});
  }

  const p1HasPicks = p1Count > 0;
  const p2HasPicks = p2Count > 0;

  const s1Base = p1HasPicks ? calculateScore(p1, p2, effectiveP1UltimateBonus) : 0;
  const s2Base = p2HasPicks ? calculateScore(p2, p1, effectiveP2UltimateBonus) : 0;
  const s1 = s1Base - p1SkipPenalty;
  const s2 = s2Base - p2SkipPenalty;

  state.ultimateUsed = Boolean(data.ultimateBonus?.[state.player]);
  ultimateBtn.disabled = state.ultimateUsed;

  if (Object.keys(p1).length === 7 && Object.keys(p2).length === 7) {
    if (!state.gameEnded) {
      state.gameEnded = true;
      const p1Name = data.players.Player1?.name || "Player 1";
      const p2Name = data.players.Player2?.name || "Player 2";
      
      if (s1 > s2) showWinnerModal(p1Name, Math.floor(s1), p2Name, Math.floor(s2), p1);
      else if (s2 > s1) showWinnerModal(p2Name, Math.floor(s2), p1Name, Math.floor(s1), p2);
      else showWinnerModal("🤝 TIE!", Math.floor(s1), `${p1Name} vs ${p2Name}`, Math.floor(s2), {});
    }
    return;
  }

  const isNowMyTurn = data.turn === state.player;
  if (state.myTurn !== isNowMyTurn && isNowMyTurn) {
    playSoundEffect('turn');
    state.hasSpunThisTurn = false;
    state.skippedThisTurn = false;
  }

  let h1 = "";
  Object.entries(p1).forEach(([r, c]) => {
    let roleScore = c.score;
    let isTraitor = false;
    
    if (c.ability?.type === "ignoreRole") {
      roleScore = c.score;
    } else {
      if (r === "Captain") roleScore = Math.floor(roleScore * 1.5);
      else if (r === "Vice") roleScore = Math.floor(roleScore * 1.2);
      else if (r === "Healer" || r === "Support") roleScore += 2;
      else if (r === "Tank" || r === "Duelist") roleScore += 1;
      else if (r === "Traitor") { roleScore = -c.score; isTraitor = true; }
    }
    
    const traitClass = isTraitor ? " traitor" : "";
    const glowClass = getGlowClass(c.score);
    const badges = [];
    if (c.ability) badges.push(`<span class="ability-badge">⚡ ${c.ability.name}</span>`);
    if (c.passiveAbility) badges.push(`<span class="ability-badge">🌀 ${c.passiveAbility.name}</span>`);
    const abilityBadge = badges.join('');
    h1 += `<div class="char-item${traitClass}"><img src="${c.img}" class="${glowClass}"><div class="char-info"><strong>${c.name}${c.formLabel ? " (" + c.formLabel + ")" : ""}</strong><span>${r} ${roleScore > 0 ? '+' : ''}${roleScore}</span>${abilityBadge}</div></div>`;
  });

  let h2 = "";
  Object.entries(p2).forEach(([r, c]) => {
    let roleScore = c.score;
    let isTraitor = false;
    
    if (c.ability?.type === "ignoreRole") {
      roleScore = c.score;
    } else {
      if (r === "Captain") roleScore = Math.floor(roleScore * 1.5);
      else if (r === "Vice") roleScore = Math.floor(roleScore * 1.2);
      else if (r === "Healer" || r === "Support") roleScore += 2;
      else if (r === "Tank" || r === "Duelist") roleScore += 1;
      else if (r === "Traitor") { roleScore = -c.score; isTraitor = true; }
    }
    
    const traitClass = isTraitor ? " traitor" : "";
    const glowClass = getGlowClass(c.score);
    const badges = [];
    if (c.ability) badges.push(`<span class="ability-badge">⚡ ${c.ability.name}</span>`);
    if (c.passiveAbility) badges.push(`<span class="ability-badge">🌀 ${c.passiveAbility.name}</span>`);
    const abilityBadge = badges.join('');
    h2 += `<div class="char-item${traitClass}"><img src="${c.img}" class="${glowClass}"><div class="char-info"><strong>${c.name}${c.formLabel ? " (" + c.formLabel + ")" : ""}</strong><span>${r} ${roleScore > 0 ? '+' : ''}${roleScore}</span>${abilityBadge}</div></div>`;
  });

  document.getElementById("p1Chars").innerHTML = h1 || "<span style='color:#888;'>No characters yet</span>";
  document.getElementById("p2Chars").innerHTML = h2 || "<span style='color:#888;'>No characters yet</span>";
  document.getElementById("p1Score").innerText = Math.floor(s1);
  document.getElementById("p2Score").innerText = Math.floor(s2);

  state.myTurn = data.turn === state.player;
  const allRolesFilled = hasAllRolesSelected();
  const canFreePass = allRolesFilled;
  spinBtn.disabled = !state.myTurn || state.spinning || allRolesFilled;
  skipBtn.disabled = !state.myTurn || state.skippedThisTurn || (!canFreePass && !state.hasSpunThisTurn);
  ultimateBtn.disabled = state.ultimateUsed || !state.myTurn || !state.hasSpunThisTurn || allRolesFilled;
  document.getElementById("status").innerText = allRolesFilled
    ? (state.myTurn ? "✅ All 7 roles filled — passing turn to opponent..." : "✅ All 7 roles filled")
    : (state.myTurn ? "🔥 YOUR TURN 🔥" : "⏳ Opponent's Turn");

  document.getElementById("p1Panel").classList.remove("active");
  document.getElementById("p2Panel").classList.remove("active");
  if (state.myTurn && state.player === "Player1") document.getElementById("p1Panel").classList.add("active");
  else if (state.myTurn && state.player === "Player2") document.getElementById("p2Panel").classList.add("active");

  if (data.players) {
    document.getElementById("p1Name").innerText = data.players.Player1?.name || "Player 1";
    document.getElementById("p2Name").innerText = data.players.Player2?.name || "Player 2";
  }
}

  state.hasSpunThisTurn = false;
  state.skippedThisTurn = false;
  state.skipPenalties = { Player1: 0, Player2: 0 };

    const roomData = snap.val() || {};

    state.player = playerSlot;

    db.ref(`rooms/${room}/players/${playerSlot}`).set({
      name: name,
      slots: {}
    }).then(async () => {

      // Auto remove on disconnect
      db.ref(`rooms/${room}/players/${playerSlot}`)
        .onDisconnect()
        .remove();

      // Set first turn if none exists
      db.ref(`rooms/${room}/turn`).once("value").then(snap => {
        if (!snap.val()) {
          db.ref(`rooms/${room}/turn`).set("Player1");
        }
      });

      // Ensure skip penalties start at 0 for both players
      db.ref(`rooms/${room}/skipPenalties`).once("value").then(snap => {
        if (!snap.val()) {
          db.ref(`rooms/${room}/skipPenalties`).set({ Player1: 0, Player2: 0 });
        }
      });

      await preloadImages();

      setTimeout(() => {
        document.getElementById("joinSection").style.display = "none";
        document.getElementById("gameSection").style.display = "block";

        document.getElementById("charCounter").innerText = state.characters.length;
        document.getElementById("p1Score").innerText = "0";
        document.getElementById("p2Score").innerText = "0";

        draw();
        updateOddsDisplay();
        setMobileTab(window.innerWidth <= 900 ? "wheel" : state.mobileTab);
        spinBtn.disabled = true;
        skipBtn.disabled = true;

        if (state.musicEnabled) {
          bgm.volume = 0.2;
          bgm.play().catch(()=>{});
        }

        // Start listening to room updates
        roomRef.on("value", (snap) => {
          updateGameDisplay(snap.val());
        });

      }, 1000);

    }).catch(err => {
      showMessage("❌ " + err.message, "error");
      joinBtn.disabled = false;
    });

  }).catch(err => {
    showMessage("❌ Firebase error: " + err.message, "error");
    joinBtn.disabled = false;
  });
}
</script>

</body>
</html>
